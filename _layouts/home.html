---
layout: default
---

<div class="home">

    <h1>Welcome</h1>
    <p>I write about distributed systems, databases, and backend engineering.</p>

    <h2>Recent Posts</h2>

    <ul>
        {% for post in site.posts limit:5 %}
        <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
            <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        </li>
        {% endfor %}
    </ul>

</div>
